<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 220px; padding: 15px; font-family: sans-serif; }
    button { width: 100%; padding: 10px; margin-bottom: 8px; cursor: pointer; border: none; border-radius: 4px; }
    #scrapeBtn { background: #4285f4; color: white; }
    #downloadBtn { background: #34a853; color: white; }
    #clearBtn { background: #ea4335; color: white; }
    #status { font-size: 13px; font-weight: bold; margin-bottom: 10px; text-align: center; }
  </style>
</head>
<body>
  <div id="status">Collected: 0</div>
  <button id="scrapeBtn">Collect & Go to Next</button>
  <button id="downloadBtn">Download All (JSON)</button>
  <button id="clearBtn">Clear Data</button>
  <script src="popup.js"></script>
</body>
</html>
